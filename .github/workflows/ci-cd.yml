name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test and Lint
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Formatting
        run: npm run format -- --check
        continue-on-error: true

      - name: Run Linter
        run: npm run lint

      - name: Run Unit Tests
        run: npm run test

      - name: Run Firebase Rules Tests
        run: npm run test:rules
        continue-on-error: true

  e2e:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Create dummy .env.local
        run: |
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=demo-project" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=dummy-api-key" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=demo-project.firebaseapp.com" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=demo-project.firebasestorage.app" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=123456789" >> .env.local
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=1:123456789:web:abcdef" >> .env.local
          echo "NEXT_PUBLIC_USE_EMULATOR=true" >> .env.local

      - name: Run Playwright Tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7


